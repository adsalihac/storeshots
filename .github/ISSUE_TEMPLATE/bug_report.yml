name: Bug report
description: Report a problem with Storeshots.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include commands, project structure, and relevant routes.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Storeshots version
      placeholder: 0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node, pnpm, Expo SDK, OS, simulator/device tooling.
