name: Screenshots

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/playground/app/**"
      - "examples/**/app/**"
      - "packages/**"

jobs:
  playground:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shotify/playground screenshots
      - uses: actions/upload-artifact@v4
        with:
          name: shotify-playground-screenshots
          path: apps/playground/screenshots
